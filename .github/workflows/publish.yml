name: Publish

on:
  push:
    branches: [ develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tigredomexico/project-desbravacash-api
  VERSION: 0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy no Azure Container Apps
        run: |
          az containerapp update \
            --name desbravacash-api \
            --resource-group rg-app \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} \
            --set-env-vars \
              Jwt__Chave='${{ secrets.JWT_CHAVE }}' \
              Jwt__Issuer='${{ secrets.JWT_ISSUER }}' \
              Jwt__Audience='${{ secrets.JWT_AUDIENCE }}' \
              ConnectionStrings__Postgres='${{ secrets.DB_CONNECTIONSTRING }}'
              Database__CertBase64='${{ secrets.DBCERT_BASE64 }}'
              Cors__AllowedOrigins__0='${{ secrets.CORS_URL }}'